<!DOCTYPE html>
<html>
<head>
    <title>Login Logs</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>CCTV System</h2>

        <p>Welcome, {{ user }}</p>

        <a href="/">Dashboard</a>

        <a href="/camera_monitoring">Camera Monitoring</a>

        <a href="/login_logs">Login Logs</a>

        <a href="/device_management">Device Management</a>

        <a href="/logout">Log Out</a>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <h1>User Login Logs</h1>

        <div class="logs-card">

            <table>

                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Login Time</th>
                </tr>

                {% for log in logs %}
                <tr>
                    <td>{{ log[0] }}</td>
                    <td>{{ log[1] }}</td>

                    <!-- FORMATTED TIME -->
                    <td>
                        {{ log[2].strftime('%Y-%m-%d %I:%M %p') }}
                    </td>

                </tr>
                {% endfor %}

            </table>

        </div>

    </div>

</div>

</body>
</html>
